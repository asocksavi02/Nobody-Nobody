[build]
builder = "NIXPACKS"

[phases.setup]
nixPkgs = [
  "chromium",
  "glib",
  "nss",
  "nspr",
  "dbus",
  "atk",
  "at-spi2-atk",
  "cups",
  "drm",
  "libx11",
  "libxcomposite",
  "libxdamage",
  "libxext",
  "libxfixes",
  "libxrandr",
  "mesa",
  "libxcb",
  "libxkbcommon",
  "pango",
  "cairo",
  "alsa-lib"
]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=./playwright-browsers playwright install chromium"
]

[deploy]
startCommand = "PLAYWRIGHT_BROWSERS_PATH=./playwright-browsers python bot.py"
